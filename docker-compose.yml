services:

  # ── Backend — FastAPI / ONNX Runtime ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: pcb_api
    ports:
      - "8000:8000"
    volumes:
      # Mount the models directory so best.onnx is read at runtime.
      # This avoids baking the ~60 MB ONNX weight file into the image,
      # and lets you swap models without rebuilding the container.
      - ./models:/app/models:ro   # :ro = read-only for safety
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s   # allow time for ONNX session to load

  # ── Frontend — Streamlit ────────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: pcb_client
    ports:
      - "8501:8501"
    environment:
      # Inside Docker, services communicate via their service name as hostname.
      # "api" resolves to the backend container on the internal Docker network.
      # Locally, the default fallback in app.py is http://127.0.0.1:8000/inspect.
      - API_URL=http://api:8000/inspect
    depends_on:
      api:
        condition: service_healthy   # wait until /health passes before starting
    restart: unless-stopped
