services:

  # ── Backend — FastAPI / ONNX Runtime ────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: config/backend.Dockerfile
    container_name: pcb_api
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s   # allow time for ONNX session to load

  # ── Frontend — Streamlit ────────────────────────────────────────────────────
  client:
    build:
      context: ..
      dockerfile: config/frontend.Dockerfile
    container_name: pcb_client
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/inspect
    depends_on:
      api:
        condition: service_healthy   # wait until /health passes before starting
    restart: unless-stopped
